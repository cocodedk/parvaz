name = "parvaz-relay"
main = "worker.js"

# cloudflare:sockets (connect) went GA before this date — no special flag needed.
compatibility_date = "2024-04-03"

# Optional — set a custom route when you own a CF-managed domain:
# [[routes]]
# pattern = "relay.example.com/*"
# zone_name = "example.com"

# Free plan is enough for personal use (100K requests/day).
workers_dev = true

# --- Secrets ---
# Do NOT put the access key here in plaintext for production. Instead:
#     npx wrangler secret put ACCESS_KEY
# And replace the hard-coded ACCESS_KEY in worker.js with `env.ACCESS_KEY`.

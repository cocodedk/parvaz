name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['**']

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: core/go.sum

      - name: Probe for Go sources
        id: go_src
        run: |
          if [ -n "$(find core -name '*.go' -print -quit 2>/dev/null)" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::core/ has no .go files yet — skipping Go steps."
          fi

      - name: Go vet
        if: steps.go_src.outputs.present == 'true'
        run: go vet -C core ./...

      - name: Go test (race + cover)
        if: steps.go_src.outputs.present == 'true'
        run: go test -C core -race -cover ./...

      - name: Go build (all packages)
        if: steps.go_src.outputs.present == 'true'
        run: go build -C core ./...

      - name: Setup Java
        if: hashFiles('gradlew') != ''
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Gradle buildSmoke
        if: hashFiles('gradlew') != ''
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          ./gradlew buildSmoke --no-daemon

      - name: Check no file exceeds 200 lines
        run: |
          set -eu
          offenders=$(find . \
            -path ./reference -prune -o \
            -path ./website -prune -o \
            -path ./.git -prune -o \
            -path ./.gradle -prune -o \
            -path ./build -prune -o \
            -path ./app/build -prune -o \
            -type f \( -name '*.go' -o -name '*.kt' -o -name '*.kts' \
                     -o -name '*.md' -o -name '*.html' -o -name '*.css' \
                     -o -name '*.yml' -o -name '*.yaml' -o -name '*.sh' \
                     -o -name '*.py' -o -name '*.xml' \) \
            -print 2>/dev/null | while read -r f; do
              lines=$(wc -l < "$f")
              if [ "$lines" -gt 200 ]; then
                echo "  $f ($lines lines)"
              fi
            done)
          if [ -n "$offenders" ]; then
            echo "Files exceed 200-line limit:"
            echo "$offenders"
            exit 1
          fi
